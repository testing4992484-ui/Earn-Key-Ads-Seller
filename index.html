function calcTier(totalPoints) {
var coins    = Math.floor(totalPoints / 100);
var diamonds = Math.floor(coins / 500);
var cups     = Math.floor(diamonds / 1000);
var tier, display, next, pct;
if (cups >= 1) {
tier = 'cup'; display = cups;
next = 'MAX'; pct = 100;
} else if (diamonds >= 1) {
tier = 'diamond'; display = diamonds;
var needed = 1000 - (diamonds % 1000);
pct = Math.round((diamonds % 1000) / 1000 * 100);
next = needed + ' more diamonds = 1 Cup';
} else if (coins >= 1) {
tier = 'coin'; display = coins;
var needed2 = 500 - (coins % 500);
pct = Math.round((coins % 500) / 500 * 100);
next = needed2 + ' more coins = 1 Diamond';
} else {
tier = 'point'; display = totalPoints;
var needed3 = 100 - (totalPoints % 100);
pct = Math.round((totalPoints % 100) / 100 * 100);
next = needed3 + ' more pts = 1 Coin';
}
return {tier:tier, display:display, coins:coins, diamonds:diamonds, cups:cups, pct:pct, next:next, raw:totalPoints};
}

function findBestMove(){

}
if(!tttBoard[4])return 4;
var corners=[0,2,6,8];for(var j=0;j<corners.length;j++){if(!tttBoard[corners[j]])return corners[j];}

return tttBoard[w[0]];
}

function checkBan(){
if(!CU) return;
db.ref('users/'+CU.uid+'/ban').once('value',function(sn){
if(!sn.exists()) return;
var b=sn.val();
if(!b.active) return;
var now=Date.now();
if(now>=b.bannedUntil){ db.ref('users/'+CU.uid+'/ban/active').set(false); return; }
showBanScreen(b, b.bannedUntil);
});
}
function showBanScreen(ban, until){
var ov=document.getElementById('ban-ov');
var rs=document.getElementById('ban-rs');
if(rs) rs.textContent='Reason: '+(ban.reason||'Policy violation');
if(ov) ov.classList.add('show');
if(banTmr) clearInterval(banTmr);
banTmr=setInterval(function(){
var rem=until-Date.now();
if(rem<=0){
clearInterval(banTmr);
if(ov) ov.classList.remove('show');
db.ref('users/'+CU.uid+'/ban/active').set(false);
showT('&#10003; Ban khatam! Welcome back!');
return;
}
var h=Math.floor(rem/3600000), m=Math.floor((rem%3600000)/60000), s=Math.floor((rem%60000)/1000);
var el=document.getElementById('ban-tm');
if(el) el.textContent=pad(h)+':'+pad(m)+':'+pad(s);
},1000);
}
function pad(n){return String(n).padStart(2,'0');}
function doBan(uid, reason){
var now=Date.now();
db.ref('users/'+uid+'/ban').set({active:true,reason:reason,bannedAt:now,bannedUntil:now+BAN_MS});
db.ref('admin_logs').push({uid:uid,action:'ban',reason:reason,ts:now});
if(CU && uid===CU.uid) checkBan();
}

function showIPWarn(old, nw){

function loadAdmin(){

});
}
function renderAdmin(users){
var el=document.getElementById('adm-list'); if(!el) return;
if(!users.length){el.innerHTML='<div style="padding:28px;text-align:center;color:var(--muted)">No users found</div>';return;}

el.innerHTML=users.map(function(u){
var bnD=u.ban&&u.ban.active&&u.ban.bannedUntil>now;
var spD=u.ipChanged;
var cls=bnD?'bn':spD?'sp':'';
var badge=bnD?"<span class='adm-sb sb-bn'>&#128683; BANNED</span>":spD?"<span class='adm-sb sb-sp'>&#9888; SUSPECT</span>":"<span class='adm-sb sb-ok'>&#10003; ACTIVE</span>";
var ini=(u.name||'U').charAt(0).toUpperCase();
var banBtn=bnD
?"<button class='adm-btn adm-unb' onclick='admUnban(""+u._uid+"")'>&#10003; Unban</button>"

return "<div class='adm-uc "+cls+"'>"
+"<div class='adm-ut'><div class='adm-uav'>"+ini+"</div><div class='adm-ui'><div class='adm-un'>"+(u.name||'?')+"</div><div class='adm-ue'>"+(u.email||'')+"</div></div>"+badge+"</div>"
+"<div class='adm-dg'>"
+"<div class='adm-d'><div class='adm-dl'>IP</div><div class='adm-dv'>"+(u.networkId||'?')+"</div></div>"
+"<div class='adm-d'><div class='adm-dl'>Points</div><div class='adm-dv'>"+(u.totalPoints||0)+"</div></div>"

+"<div class='adm-d'><div class='adm-dl'>Joined</div><div class='adm-dv'>"+new Date(u.joinedAt||0).toLocaleDateString()+"</div></div>"
+"</div>"
+"<div class='adm-ar'>"+banBtn+"</div>"
+"</div>";
}).join('');
}
